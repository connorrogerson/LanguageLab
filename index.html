<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LanguageLab — Language Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
:root {
  --ink: #1a1a2e;
  --cream: #faf8f4;
  --warm: #f5f0e8;
  --red: #c0392b;
  --gold: #d4a017;
  --green: #27ae60;
  --blue: #2471a3;
  --muted: #7f8c8d;
  --border: #ddd5c8;
  --card: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
.app-container { max-width: 900px; margin: 0 auto; padding: 20px; }
.app-header { text-align: center; padding: 32px 0 24px; border-bottom: 3px solid var(--ink); margin-bottom: 32px; position: relative; }
.app-header::after { content: ''; position: absolute; bottom: -6px; left: 0; right: 0; height: 1px; background: var(--ink); }
.app-title { font-family: 'DM Serif Display', serif; font-size: 2.8rem; letter-spacing: -0.02em; line-height: 1.1; }
.app-title span { color: var(--red); }
.app-subtitle { font-size: 0.95rem; color: var(--muted); margin-top: 6px; font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; }
.nav-bar { display: flex; margin-bottom: 32px; border: 2px solid var(--ink); overflow: hidden; }
.nav-btn { flex: 1; padding: 14px 12px; border: none; background: var(--card); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink); border-right: 1px solid var(--border); }
.nav-btn:last-child { border-right: none; }
.nav-btn:hover { background: var(--warm); }
.nav-btn.active { background: var(--ink); color: var(--cream); }
.card { background: var(--card); border: 2px solid var(--ink); padding: 28px; margin-bottom: 20px; }
.card-header { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.info-box { padding: 14px 18px; background: var(--warm); border-left: 4px solid var(--blue); font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; }
.drill-verb-display { text-align: center; padding: 24px; margin-bottom: 24px; background: var(--ink); color: var(--cream); }
.drill-verb { font-family: 'DM Serif Display', serif; font-size: 2.2rem; }
.drill-meaning { font-size: 0.9rem; opacity: 0.7; margin-top: 4px; }
.drill-tense { display: inline-block; margin-top: 8px; padding: 4px 16px; background: var(--red); color: white; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
.drill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.drill-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid var(--border); background: var(--warm); }
.drill-pronoun { font-weight: 600; min-width: 80px; font-size: 0.95rem; color: var(--blue); }
.drill-input { flex: 1; padding: 8px 12px; border: 2px solid var(--border); font-family: 'Outfit', sans-serif; font-size: 0.95rem; background: white; transition: border-color 0.2s; min-width: 0; }
.drill-input:focus { outline: none; border-color: var(--blue); }
.drill-input.correct { border-color: var(--green); background: #e8f8f0; }
.drill-input.incorrect { border-color: var(--red); background: #fde8e6; }
.drill-answer { font-size: 0.85rem; margin-top: 4px; font-weight: 500; color: var(--red); }
.btn { padding: 12px 28px; border: 2px solid var(--ink); font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.06em; }
.btn-primary { background: var(--ink); color: var(--cream); }
.btn-primary:hover { background: var(--red); border-color: var(--red); }
.btn-secondary { background: var(--card); color: var(--ink); }
.btn-secondary:hover { background: var(--warm); }
.btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.score-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--warm); border: 1px solid var(--border); margin-bottom: 20px; font-size: 0.9rem; }
.score-num { font-weight: 700; font-size: 1.1rem; }
.score-num.good { color: var(--green); } .score-num.ok { color: var(--gold); } .score-num.poor { color: var(--red); }
.streak { display: inline-flex; align-items: center; gap: 4px; font-size: 0.85rem; font-weight: 600; color: var(--gold); }
.tense-selector { display: flex; flex-wrap: wrap; margin-bottom: 20px; border: 2px solid var(--ink); overflow: hidden; }
.tense-btn { flex: 1 1 auto; min-width: 110px; padding: 10px 8px; border: none; background: var(--card); font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.03em; }
.tense-btn:hover { background: var(--warm); } .tense-btn.active { background: var(--red); color: white; }
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.filter-chip { padding: 6px 16px; border: 1.5px solid var(--border); background: var(--card); font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.filter-chip:hover { border-color: var(--ink); }
.filter-chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.flashcard-container { perspective: 1000px; margin: 20px 0; }
.flashcard { width: 100%; min-height: 220px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s ease; }
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face { position: absolute; inset: 0; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; border: 2px solid var(--ink); }
.flashcard-front { background: var(--ink); color: var(--cream); }
.flashcard-back { background: var(--card); transform: rotateY(180deg); }
.flashcard-word { font-family: 'DM Serif Display', serif; font-size: 2rem; text-align: center; }
.flashcard-detail { font-size: 0.95rem; margin-top: 8px; opacity: 0.7; }
.flashcard-gender { display: inline-block; margin-top: 12px; padding: 4px 14px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.gender-m { background: var(--blue); color: white; } .gender-f { background: var(--red); color: white; } .gender-n { background: var(--green); color: white; }
.flashcard-hint { font-size: 0.8rem; color: var(--muted); margin-top: 16px; }
.flashcard-progress { text-align: center; margin-bottom: 16px; font-size: 0.9rem; color: var(--muted); }
.flashcard-nav { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
.worksheet-preview { border: 2px solid var(--ink); padding: 32px; background: white; font-size: 0.95rem; }
.ws-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; text-align: center; margin-bottom: 4px; }
.ws-subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.ws-section { margin-bottom: 24px; } .ws-section-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--blue); }
.ws-question { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; line-height: 1.6; }
.ws-q-num { font-weight: 700; min-width: 24px; color: var(--muted); }
.ws-blank { display: inline-block; min-width: 140px; border-bottom: 1.5px solid var(--ink); margin: 0 4px; }
.ws-name-line { display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px dashed var(--border); }
.ws-name-field { font-size: 0.85rem; color: var(--muted); }
.ws-answer-key { margin-top: 24px; padding-top: 16px; border-top: 2px dashed var(--border); font-size: 0.85rem; color: var(--muted); }
.ws-answer-key strong { display: block; margin-bottom: 6px; color: var(--ink); text-transform: uppercase; letter-spacing: 0.04em; }
.quiz-question { padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); background: var(--warm); }
.quiz-question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.quiz-q-num { font-weight: 700; font-size: 0.9rem; color: var(--muted); }
.quiz-verb-label { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
.quiz-tense-label { display: inline-block; padding: 2px 10px; background: var(--red); color: white; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.quiz-prompt { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.quiz-prompt-text { font-weight: 600; color: var(--blue); min-width: 80px; }
.quiz-input { flex: 1; min-width: 160px; padding: 8px 12px; border: 2px solid var(--border); font-family: 'Outfit', sans-serif; font-size: 0.95rem; background: white; transition: border-color 0.2s; }
.quiz-input:focus { outline: none; border-color: var(--blue); }
.quiz-input.correct { border-color: var(--green); background: #e8f8f0; }
.quiz-input.incorrect { border-color: var(--red); background: #fde8e6; }
.quiz-meaning { font-size: 0.82rem; color: var(--muted); font-style: italic; }
.quiz-results { text-align: center; padding: 32px; }
.quiz-results-score { font-family: 'DM Serif Display', serif; font-size: 2.4rem; margin: 12px 0; }

.mode-toggle { display: flex; margin-bottom: 20px; border: 2px solid var(--ink); overflow: hidden; }

@media print { .no-print { display: none !important; } .worksheet-preview { border: none; padding: 20px 0; } body { background: white; } }
@media (max-width: 600px) { .app-title { font-size: 2rem; } .card { padding: 18px; } .nav-btn { font-size: 0.75rem; padding: 10px 6px; } .drill-verb { font-size: 1.6rem; } .drill-grid { grid-template-columns: 1fr; } .tense-btn { min-width: 90px; font-size: 0.7rem; padding: 8px 4px; } }

function ConjugationByTense() {
  const [tense,setTense]=useState("present");
  const [verb,setVerb]=useState(null);
  const [ans,setAns]=useState({});
  const [checked,setChecked]=useState(false);
  const [score,setScore]=useState({c:0,t:0});
  const [streak,setStreak]=useState(0);
  const refs=useRef({});
  const next=useCallback(()=>{setVerb(VERBS[Math.floor(Math.random()*VERBS.length)]);setAns({});setChecked(false);},[]);
  useEffect(()=>{next();},[next]);
  const check=()=>{if(!verb)return;setChecked(true);const c=verb[tense];let all=true,cc=0;PRONOUNS.forEach(p=>{if((ans[p]||"").trim().toLowerCase()===c[p].toLowerCase())cc++;else all=false;});setScore(s=>({c:s.c+cc,t:s.t+6}));setStreak(all?streak+1:0);};
  const kd=(e,p)=>{if(e.key==="Enter"){const i=PRONOUNS.indexOf(p);if(i<5)refs.current[PRONOUNS[i+1]]?.focus();else check();}};
  if(!verb)return null;
  const c=verb[tense],pct=score.t>0?Math.round(score.c/score.t*100):null;
  return (<div>
    <div className="info-box">Conjugate the verb for each pronoun. Press <strong>Enter</strong> to move between fields.</div>
    <div className="tense-selector no-print">{TENSES.map(t=><button key={t} className={`tense-btn ${tense===t?"active":""}`} onClick={()=>{setTense(t);next();}}>{TENSE_LABELS[t]}</button>)}</div>
    {(pct!==null||streak>1)&&<div className="score-bar no-print">{pct!==null&&<span>Accuracy: <span className={`score-num ${pct>=80?"good":pct>=50?"ok":"poor"}`}>{pct}%</span></span>}{streak>1&&<span className="streak">{"\uD83D\uDD25"} {streak} in a row</span>}</div>}
    <div className="drill-verb-display"><div className="drill-verb">{verb.infinitive}</div><div className="drill-meaning">{verb.meaning}</div><div className="drill-tense">{TENSE_LABELS[tense]}</div></div>
    <div className="drill-grid">{PRONOUNS.map(p=>{const ok=checked&&(ans[p]||"").trim().toLowerCase()===c[p].toLowerCase();const bad=checked&&!ok;return(<div key={p} className="drill-item"><span className="drill-pronoun">{p}</span><div style={{flex:1}}><input ref={el=>refs.current[p]=el} className={`drill-input ${checked?(ok?"correct":"incorrect"):""}`} value={ans[p]||""} onChange={e=>setAns({...ans,[p]:e.target.value})} onKeyDown={e=>kd(e,p)} disabled={checked} placeholder="..." autoComplete="off" spellCheck="false"/>{bad&&<div className="drill-answer">{"\u2192"} {c[p]}</div>}</div></div>);})}</div>
    <div className="btn-group no-print">{!checked?<><button className="btn btn-primary" onClick={check}>Check Answers</button><button className="btn btn-secondary" onClick={next}>Skip</button></>:<button className="btn btn-primary" onClick={next}>Next Verb {"\u2192"}</button>}</div>
  </div>);
}

function RandomQuiz() {
  const [qs,setQs]=useState([]);
  const [ans,setAns]=useState({});
  const [checked,setChecked]=useState(false);
  const [selT,setSelT]=useState(new Set(TENSES));
  const refs=useRef({});
  const gen=useCallback((ts)=>{const pool=TENSES.filter(t=>(ts||selT).has(t));if(!pool.length)return;const q=[];for(let i=0;i<10;i++){const v=VERBS[Math.floor(Math.random()*VERBS.length)],t=pool[Math.floor(Math.random()*pool.length)],p=PRONOUNS[Math.floor(Math.random()*PRONOUNS.length)];q.push({v,t,p,a:v[t][p]});}setQs(q);setAns({});setChecked(false);},[selT]);
  useEffect(()=>{gen();},[]);
  const toggle=(t)=>{const n=new Set(selT);if(n.has(t)){if(n.size>1)n.delete(t);}else n.add(t);setSelT(n);};
  const kd=(e,i)=>{if(e.key==="Enter"){if(i<9)refs.current[i+1]?.focus();else setChecked(true);}};
  const cc=checked?qs.filter((q,i)=>(ans[i]||"").trim().toLowerCase()===q.a.toLowerCase()).length:0;
  if(checked){const pct=Math.round(cc/10*100);const msg=pct===100?"Perfekt! Absolutely flawless!":pct>=80?"Sehr gut! Really strong work.":pct>=60?"Gut! You're getting there.":pct>=40?"Keep practising \u2014 you'll get there!":"Don't worry \u2014 review the corrections and try again.";
  return(<div><div className="quiz-results"><div style={{fontSize:"2.5rem"}}>{pct>=80?"\uD83C\uDF1F":pct>=50?"\uD83D\uDCAA":"\uD83D\uDCDA"}</div><div className="quiz-results-score"><span className={`score-num ${pct>=80?"good":pct>=50?"ok":"poor"}`}>{cc}/10</span></div><div className="quiz-results-msg">{msg}</div></div>
    {qs.map((q,i)=>{const ok=(ans[i]||"").trim().toLowerCase()===q.a.toLowerCase();return(<div key={i} className="quiz-question"><div className="quiz-question-header"><span className="quiz-q-num">Q{i+1}</span><span className="quiz-verb-label">{q.v.infinitive}</span><span className="quiz-tense-label">{TENSE_LABELS[q.t]}</span></div><div className="quiz-prompt"><span className="quiz-prompt-text">{q.p}</span><input className={`quiz-input ${ok?"correct":"incorrect"}`} value={ans[i]||""} disabled/></div>{!ok&&<div className="drill-answer">{"\u2192"} {q.a}</div>}</div>);})}
    <div className="btn-group no-print" style={{justifyContent:"center"}}><button className="btn btn-primary" onClick={()=>gen()}>New Quiz {"\u2192"}</button></div></div>);}
  return(<div>
    <div className="info-box">10 random questions across different verbs, tenses, and pronouns. Filter tenses below. Press <strong>Enter</strong> to move between questions.</div>
    <div className="filter-bar no-print">{TENSES.map(t=><button key={t} className={`filter-chip ${selT.has(t)?"active":""}`} onClick={()=>toggle(t)}>{TENSE_LABELS[t]}</button>)}</div>
    {qs.map((q,i)=>(<div key={i} className="quiz-question"><div className="quiz-question-header"><span className="quiz-q-num">Q{i+1}</span><span className="quiz-verb-label">{q.v.infinitive} <span className="quiz-meaning">({q.v.meaning})</span></span><span className="quiz-tense-label">{TENSE_LABELS[q.t]}</span></div><div className="quiz-prompt"><span className="quiz-prompt-text">{q.p}</span><input ref={el=>refs.current[i]=el} className="quiz-input" value={ans[i]||""} onChange={e=>setAns({...ans,[i]:e.target.value})} onKeyDown={e=>kd(e,i)} placeholder="..." autoComplete="off" spellCheck="false"/></div></div>))}
    <div className="btn-group no-print"><button className="btn btn-primary" onClick={()=>setChecked(true)}>Check All Answers</button><button className="btn btn-secondary" onClick={()=>gen()}>New Questions</button></div>
  </div>);
}

function VocabFlashcards() {
  const [topic,setTopic]=useState("All");const [cards,setCards]=useState([]);const [idx,setIdx]=useState(0);const [flipped,setFlipped]=useState(false);const [dir,setDir]=useState("de-en");const [known,setKnown]=useState(0);
  useEffect(()=>{const f=topic==="All"?VOCAB:VOCAB.filter(v=>v.topic===topic);setCards(shuffle(f));setIdx(0);setFlipped(false);setKnown(0);},[topic]);
  const next=(g)=>{if(g)setKnown(k=>k+1);setFlipped(false);setTimeout(()=>setIdx(i=>i+1),150);};
  const restart=()=>{const f=topic==="All"?VOCAB:VOCAB.filter(v=>v.topic===topic);setCards(shuffle(f));setIdx(0);setFlipped(false);setKnown(0);};
  if(!cards.length)return<div className="info-box">No cards.</div>;
  if(idx>=cards.length){const pct=Math.round(known/cards.length*100);return(<div className="card" style={{textAlign:"center",padding:"48px 28px"}}><div style={{fontSize:"3rem",marginBottom:12}}>{"\uD83C\uDF89"}</div><div className="card-header" style={{border:"none",textAlign:"center"}}>Round complete!</div><p style={{fontSize:"1.1rem",marginBottom:8}}>You knew <span className={`score-num ${pct>=80?"good":pct>=50?"ok":"poor"}`}>{known}/{cards.length}</span> words ({pct}%)</p><div className="btn-group" style={{justifyContent:"center",marginTop:24}}><button className="btn btn-primary" onClick={restart}>Go Again</button></div></div>);}
  const card=cards[idx],gm={m:"der (m)",f:"die (f)",n:"das (n)"},front=dir==="de-en"?card.german:card.english,back=dir==="de-en"?card.english:card.german;
  return(<div className="card"><h2 className="card-header">Vocabulary Flashcards</h2>
    <div className="filter-bar no-print"><button className={`filter-chip ${topic==="All"?"active":""}`} onClick={()=>setTopic("All")}>All</button>{TOPICS.map(t=><button key={t} className={`filter-chip ${topic===t?"active":""}`} onClick={()=>setTopic(t)}>{t}</button>)}</div>

    <div className="flashcard-progress">Card {idx+1} of {cards.length}</div>
    <div className="flashcard-container"><div className={`flashcard ${flipped?"flipped":""}`} onClick={()=>setFlipped(!flipped)}><div className="flashcard-face flashcard-front"><div className="flashcard-word">{front}</div>{dir==="de-en"&&<span className={`flashcard-gender gender-${card.gender}`}>{gm[card.gender]}</span>}<div className="flashcard-detail">{card.topic}</div><div className="flashcard-hint">Click to flip</div></div><div className="flashcard-face flashcard-back"><div className="flashcard-word">{back}</div>{dir==="en-de"&&<span className={`flashcard-gender gender-${card.gender}`}>{gm[card.gender]}</span>}<div className="flashcard-detail">{card.topic}</div></div></div></div>
    <div className="flashcard-nav no-print"><button className="btn btn-secondary" onClick={()=>next(false)}>Still learning</button><button className="btn btn-primary" onClick={()=>next(true)}>Got it {"\u2713"}</button></div></div>);

function WorksheetGenerator() {
  const [ws,setWs]=useState(null);const [showA,setShowA]=useState(false);const [type,setType]=useState("mixed");
  const gen=()=>{const w={sections:[],answers:[]};setShowA(false);
    if(type==="conjugation"||type==="mixed"){const vs=pick(VERBS,3);const s={title:"Section A \u2014 Verb Conjugation",questions:[]};let q=1;vs.forEach(v=>{const t=TENSES[Math.floor(Math.random()*TENSES.length)];const ps=pick(PRONOUNS,3);ps.forEach(p=>{s.questions.push({num:q,text:`Conjugate \u201C${v.infinitive}\u201D (${v.meaning}) in the ${TENSE_LABELS[t]} for `,bold:p});w.answers.push({num:q,answer:`${p} ${v[t][p]}`});q++;});});w.sections.push(s);}
    if(type==="vocab"||type==="mixed"){const words=pick(VOCAB,8);const lB=type==="mixed"?"Section B":"Section A",lC=type==="mixed"?"Section C":"Section B";
      const sB={title:`${lB} \u2014 Vocabulary (German \u2192 English)`,questions:[]};const stB=w.answers.length+1;words.slice(0,4).forEach((v,i)=>{sB.questions.push({num:stB+i,text:`${v.german} = `});w.answers.push({num:stB+i,answer:v.english});});w.sections.push(sB);
      const sC={title:`${lC} \u2014 Vocabulary (English \u2192 German)`,questions:[]};const stC=w.answers.length+1;words.slice(4).forEach((v,i)=>{sC.questions.push({num:stC+i,text:`${v.english} = `});w.answers.push({num:stC+i,answer:v.german});});w.sections.push(sC);}
    setWs(w);};
  useEffect(()=>{gen();},[type]);
  return(<div className="card"><h2 className="card-header">Randomised Worksheets</h2>
    <div className="filter-bar no-print"><button className={`filter-chip ${type==="mixed"?"active":""}`} onClick={()=>setType("mixed")}>Mixed</button><button className={`filter-chip ${type==="conjugation"?"active":""}`} onClick={()=>setType("conjugation")}>Conjugation only</button><button className={`filter-chip ${type==="vocab"?"active":""}`} onClick={()=>setType("vocab")}>Vocab only</button></div>
    {ws&&<div className="worksheet-preview"><div className="ws-title">German Practice Worksheet</div><div className="ws-subtitle">A-Level / Adult Beginners</div><div className="ws-name-line"><span className="ws-name-field">Name: _________________________</span><span className="ws-name-field">Date: ______________</span></div>
      {ws.sections.map((s,i)=><div key={i} className="ws-section"><div className="ws-section-title">{s.title}</div>{s.questions.map(q=><div key={q.num} className="ws-question"><span className="ws-q-num">{q.num}.</span><span>{q.text}{q.bold&&<strong>{q.bold}</strong>}{q.bold&&":"} <span className="ws-blank"/></span></div>)}</div>)}
      {showA&&<div className="ws-answer-key"><strong>Answer Key</strong>{ws.answers.map(a=><div key={a.num}>{a.num}. {a.answer}</div>)}</div>}</div>}
    <div className="btn-group no-print"><button className="btn btn-primary" onClick={gen}>Generate New {"\u21BB"}</button><button className="btn btn-secondary" onClick={()=>setShowA(!showA)}>{showA?"Hide Answers":"Show Answers"}</button><button className="btn btn-secondary" onClick={()=>window.print()}>Print Worksheet {"\uD83D\uDDA8"}</button></div></div>);
